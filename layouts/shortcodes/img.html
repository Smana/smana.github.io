{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" | default "" -}}
{{- $width := .Get "width" -}}
{{- $cap := .Get "caption" -}}

{{- $image := .Page.Resources.GetMatch $src -}}

<figure style="text-align: center;">
  <picture>
    {{- if and $image $image.Width -}}
      {{- $w1x := math.Min 1200 $image.Width | int -}}
      {{- $w2x := math.Min 2400 $image.Width | int -}}
      {{- $r1x := $image.Resize (printf "%dx" $w1x) -}}
      {{- $r2x := $image.Resize (printf "%dx" $w2x) -}}
      {{- $w1xt := try ($r1x.Process "webp q90") -}}
      {{- $w2xt := try ($r2x.Process "webp q90") -}}
      {{- $sizes := "(max-width: 600px) 100vw, min(1200px, 100vw)" -}}
      {{- with $width -}}
        {{- $sizes = printf "(max-width: 600px) 100vw, min(%dpx, 100vw)" (. | int) -}}
      {{- end -}}
      {{- if and (not $w1xt.Err) (not $w2xt.Err) }}
      <source type="image/webp"
              srcset="{{ $w1xt.Value.RelPermalink }} {{ $w1x }}w, {{ $w2xt.Value.RelPermalink }} {{ $w2x }}w"
              sizes="{{ $sizes }}">
      {{- else }}
        {{- warnf "img shortcode: skipping WebP for %q (encoder failed: %s)" $image.Name (or $w1xt.Err $w2xt.Err) -}}
      {{- end }}
      <img
        loading="lazy"
        decoding="async"
        alt="{{ $alt }}"
        class="image_figure image_internal image_processed"
        width="{{ $image.Width }}"
        height="{{ $image.Height }}"
        src="{{ $image.RelPermalink }}"
        {{- with $width }}
        style="max-width: min({{ . }}px, 100%); display: block; margin: 0 auto;"
        {{- end }}
      />
    {{- else -}}
      <img
        loading="lazy"
        decoding="async"
        alt="{{ $alt }}"
        class="image_figure image_internal image_unprocessed"
        src="{{ $src | absURL }}"
        {{- with $width }}
        style="max-width: min({{ . }}px, 100%); display: block; margin: 0 auto;"
        {{- end }}
      />
    {{- end -}}
  </picture>
  {{- with $cap }}
  <figcaption>{{ . | markdownify }}</figcaption>
  {{- end }}
</figure>
